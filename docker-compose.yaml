services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: clint-app-container
        ports:
            - "8000:80"
        volumes:
            - ./src:/app/src
            - ./templates:/app/templates
            - ./public:/app/public
            - ./var:/app/var
        environment:
            DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}?serverVersion=8.0.32&charset=utf8mb4"
            APP_ENV: prod # change to prod  
            APP_DEBUG: "0" # change to "0" in prod
        depends_on:
            db:
                condition: service_healthy
        networks:
            - clint-network
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

